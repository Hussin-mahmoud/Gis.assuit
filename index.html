<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة الطالب | Hussin Mahmoud</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; direction: rtl; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1000px; margin: auto; padding: 15px; box-sizing: border-box; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; border-radius: 20px; padding: 20px; margin-top: 15px; }
        
        .tabs { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: #1e293b; color: #94a3b8; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-size: 14px; flex-shrink: 0; }
        .tab-btn.active { background: #38bdf8; color: #020617; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

        .card { background: #1e293b; border-radius: 15px; padding: 15px; border: 1px solid #334155; transition: 0.3s; animation: slideUp 0.5s ease; display: flex; flex-direction: column; }
        @keyframes slideUp { from { opacity:0; transform: translateY(15px); } to { opacity:1; transform: translateY(0); } }
        .card h3 { margin: 0 0 10px 0; font-size: 16px; color: #f8fafc; }

        .video-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 10px; background-size: cover; background-position: center; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #334155; }
        .play-icon { width: 45px; height: 45px; background: rgba(56, 189, 248, 0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #020617; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .btn-go { display: block; text-align: center; background: #38bdf8; color: #020617; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: auto; font-size: 14px; }
        
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; text-align: center; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #38bdf8; }

        footer { text-align: center; padding: 40px 20px; color: #64748b; font-size: 13px; }
        footer a { color: #38bdf8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-view" class="container" style="max-width: 380px; margin-top: 15vh; text-align: center; display: none;">
    <div class="glass">
        <h1 style="color: #38bdf8; margin: 0 0 10px 0; font-size: 24px;">GIS ACADEMY</h1>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">يرجى إدخال الكود للوصول للمحتوى</p>
        <input type="text" id="code-in" placeholder="أدخل كود الطالب">
        <button onclick="auth()" style="width:100%; padding:14px; background:#38bdf8; border:none; border-radius:12px; font-weight:bold; cursor:pointer; font-size: 16px;">دخول للمنصة</button>
    </div>
</div>

<div id="main-view" class="container" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 style="margin: 0; font-size: 20px;">مرحباً بك 🎓</h2>
        <button onclick="logout()" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:6px 12px; border-radius:8px; cursor:pointer; font-size: 13px;">خروج</button>
    </div>
    <div class="glass">
        <div class="tabs">
            <button class="tab-btn active" onclick="show('videos', this)">🎬 الفيديوهات</button>
            <button class="tab-btn" onclick="show('files', this)">📚 الملخصات</button>
            <button class="tab-btn" onclick="show('exams', this)">📝 الامتحانات</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>
</div>

<footer>
    <p>تم التطوير بواسطة <br> <a href="https://www.instagram.com/hussin_mahmoud1?igsh=cDY2bnJneGg5ZDV3" target="_blank">Hussin Mahmoud</a></p>
</footer>

<script>
    const firebaseConfig = { databaseURL: "https://gis-platform-c7d34-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    window.onload = () => {
        const c = localStorage.getItem('g_c');
        if(c) { check(c); } 
        else { document.getElementById('login-view').style.display='block'; }
    };

    function auth() { check(document.getElementById('code-in').value.trim()); }

    function check(c) {
        if(!c) return;
        db.ref('GisAcademy/Codes/'+c).once('value', s => {
            if(s.exists()) {
                localStorage.setItem('g_c', c);
                document.getElementById('login-view').style.display='none';
                document.getElementById('main-view').style.display='block';
                show('videos', document.querySelector('.tab-btn'));
            } else { 
                alert("الكود غير صحيح!"); 
                logout(); 
            }
        });
    }

    function show(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        db.ref('GisAcademy/Content').orderByChild('type').equalTo(type).on('value', snap => {
            const g = document.getElementById('grid');
            g.innerHTML = "";
            if(!snap.exists()) {
                g.innerHTML = `<p style="text-align:center; color:#94a3b8; grid-column: 1/-1; padding: 20px;">لا يوجد محتوى متاح حالياً.</p>`;
                return;
            }
            snap.forEach(item => {
                const data = item.val();
                let content = "";
                if(type === 'videos') {
                    let thumb = "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=500"; 
                    if(data.link.includes('youtube.com') || data.link.includes('youtu.be')) {
                        let id = data.link.includes('v=') ? data.link.split('v=')[1].split('&')[0] : data.link.split('/').pop();
                        thumb = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
                    }
                    content = `
                        <div class="video-thumb" style="background-image: url('${thumb}')" onclick="window.open('${data.link}', '_blank')">
                            <div class="play-icon">▶</div>
                        </div>
                        <a href="${data.link}" target="_blank" class="btn-go" style="margin-top:15px">مشاهدة الآن</a>`;
                } else {
                    content = `<a href="${data.link}" target="_blank" class="btn-go">تحميل / فتح الملف</a>`;
                }
                g.innerHTML += `<div class="card"><h3>${data.title}</h3>${content}</div>`;
            });
        });
    }

    function logout() { 
        localStorage.removeItem('g_c'); 
        location.reload(); 
    }
</script>
</body>
</html>
